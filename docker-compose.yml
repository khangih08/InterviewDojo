services:
  postgres:
    image: postgres:16
    container_name: interviewdojo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: interview_dojo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interview_dojo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
