name: Vercel Deploy Reusable

on:
  workflow_call:
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true

jobs:
  deploy-and-wait:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        #working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel project
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel
        id: deploy
        run: |
          set -euo pipefail
          DEPLOYMENT_URL="$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}" 2>&1 | tee /tmp/vercel_deploy.log | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1 | tr -d '\r')"

          if [ -z "${DEPLOYMENT_URL}" ]; then
            echo "::error::Could not detect deployment URL from Vercel CLI output."
            exit 1
          fi

          echo "deployment_url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Vercel deployment URL: ${DEPLOYMENT_URL}"

      - name: Show Vercel deployment logs
        if: always()
        run: |
          if [ -n "${{ steps.deploy.outputs.deployment_url }}" ]; then
            vercel inspect "${{ steps.deploy.outputs.deployment_url }}" --logs --token="${{ secrets.VERCEL_TOKEN }}" || true
          else
            echo "No deployment URL found. Check previous Vercel step output for errors."
          fi
