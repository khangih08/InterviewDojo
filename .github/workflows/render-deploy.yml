name: Render Deploy Reusable

on:
  workflow_call:
    secrets:
      RENDER_DEPLOY_HOOK_URL:
        required: true
      RENDER_API_KEY:
        required: true
      RENDER_SERVICE_ID:
        required: true

jobs:
  deploy-and-wait:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Trigger Render deploy hook
        run: |
          set -euo pipefail
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy hook triggered."

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Wait for Render deploy result
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          RENDER_API_KEY_CLEAN="$(echo "${RENDER_API_KEY}" | tr -d '[:space:]')"
          RENDER_SERVICE_ID_CLEAN="$(echo "${RENDER_SERVICE_ID}" | tr -d '[:space:]')"

          if [ -z "${RENDER_API_KEY_CLEAN}" ] || [ -z "${RENDER_SERVICE_ID_CLEAN}" ]; then
            echo "::error::RENDER_API_KEY or RENDER_SERVICE_ID is empty after normalization."
            exit 1
          fi

          SERVICE_URL="https://api.render.com/v1/services/${RENDER_SERVICE_ID_CLEAN}"
          API_URL="${SERVICE_URL}/deploys?limit=20"
          DASHBOARD_URL="https://dashboard.render.com/web/${RENDER_SERVICE_ID_CLEAN}"

          echo "::notice::Render dashboard: ${DASHBOARD_URL}"
          echo "Waiting for Render deploy status..."

          SERVICE_HTTP_CODE="$(curl -sS -o /tmp/render_service.json -w "%{http_code}" -H "Authorization: Bearer ${RENDER_API_KEY_CLEAN}" "${SERVICE_URL}")"
          if [ "${SERVICE_HTTP_CODE}" != "200" ]; then
            echo "::error::Render service preflight failed with HTTP ${SERVICE_HTTP_CODE}."
            echo "::error::Check that RENDER_SERVICE_ID belongs to the same account/team as RENDER_API_KEY."
            cat /tmp/render_service.json || true
            exit 1
          fi

          for i in $(seq 1 60); do
            HTTP_CODE="$(curl -sS -o /tmp/render_deploys.json -w "%{http_code}" -H "Authorization: Bearer ${RENDER_API_KEY_CLEAN}" "${API_URL}")"
            if [ "${HTTP_CODE}" != "200" ]; then
              echo "::error::Render deploy list API failed with HTTP ${HTTP_CODE}."
              cat /tmp/render_deploys.json || true
              exit 1
            fi

            RESP="$(cat /tmp/render_deploys.json)"
            DEPLOY_ID="$(echo "${RESP}" | jq -r '.[0].id // .[0].deploy.id // empty')"
            STATUS="$(echo "${RESP}" | jq -r '.[0].status // .[0].deploy.status // empty')"
            DEPLOY_URL="https://dashboard.render.com/web/${RENDER_SERVICE_ID_CLEAN}/deploys/${DEPLOY_ID}"

            echo "Attempt ${i}/60 - status=${STATUS:-unknown} deploy=${DEPLOY_ID:-none}"
            echo "::notice::Render deploy URL: ${DEPLOY_URL}"

            if [ -z "${DEPLOY_ID}" ] || [ -z "${STATUS}" ]; then
              echo "No deploy found yet, waiting..."
              sleep 10
              continue
            fi

            case "${STATUS}" in
              live)
                echo "Render deploy succeeded."
                exit 0
                ;;
              build_failed|update_failed|failed|deactivated|canceled|cancelled)
                echo "::error::Render deploy failed with status ${STATUS}."
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "::error::Timeout waiting for Render deploy"
          exit 1
