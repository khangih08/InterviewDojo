name: Backend Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: backend-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend coverage
        run: npm run test:cov

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: error

      - name: Add backend coverage summary
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const summaryPath = path.join(process.cwd(), 'coverage', 'coverage-summary.json');
          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          const rows = Object.entries(summary)
            .filter(([key]) => key !== 'total')
            .map(([file, metrics]) => ({
              file: file.replace(`${process.cwd()}${path.sep}`, ''),
              lines: metrics.lines.pct,
            }))
            .sort((a, b) => a.lines - b.lines)
            .slice(0, 5);
          const total = summary.total;
          const output = [
            '## Backend Coverage',
            '',
            `- Statements: ${total.statements.pct}%`,
            `- Branches: ${total.branches.pct}%`,
            `- Functions: ${total.functions.pct}%`,
            `- Lines: ${total.lines.pct}%`,
            '',
            '### Lowest 5 Files By Line Coverage',
            ...rows.map((row) => `- ${row.file}: ${row.lines}%`),
            '',
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${output}\n`);
          EOF
